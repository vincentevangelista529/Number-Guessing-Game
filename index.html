<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Number Guessing Game!</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <h1>Number Guessing Game!</h1>
    <p id="desc">Guess a number between <span>1</span> and <span>100</span></p>
    <p id="bestScore">Your Best Score is:</p>
    <input type="number" id="guess-input" placeholder="Enter your guess">
    <button type="button" id="guess-btn" class="btn-guess">Guess</button>
    <p id="feedback">


    </p>

    <div id="attemptCounter">

    </div>

    <button type="button" id = "restart-btn" class="btn-restart" style="display:none">Play Again!</button>
   
   <script src="script.js">

    </script>
 
  </body>
</html>
